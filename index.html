<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="immagini/surfer.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="immagini/surfer.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viento Medano</title>
    <style>
        .container {
            display: flex;
            /* disposizione in riga */
            justify-content: left;
            /* centrati orizzontalmente */
            gap: 10px;
            /* spazio tra i quadrati */
            margin-bottom: 10px;
        }

        .quadratoDir {
            width: 50px;
            height: 20px;
            border-radius: 20px;
            /* angoli smussati */
            border: 2px solid #000;
        }

        .quadratoVen {
            width: 200px;
            height: 20px;
            border-radius: 20px;
            /* angoli smussati */
            border: 2px solid #000;
            background-color: green;
        }

        #quadrato1 {
            background: linear-gradient(to right, #ffffff, #ffffff);
        }

        #quadrato2 {
            background: linear-gradient(to right, #ffffff, #ffffff);
        }

        body {
            font-family: Arial, sans-serif;

            color: #fff;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            padding: 50px 20px;
        }

        h1 {
            font-family: 'Courier New';
            color: #030303;
            text-align: left;
            margin: 0;
            padding: 30;
            font-size: 1.2rem;
        }

        h2 {
            font-family: 'Courier New';

            color: #030303;
            text-align: center;
            margin: 0;
            padding: 30;
            font-size: 1.2rem;
        }

        h3 {
            font-family: 'Courier New';
            background: linear-gradient(to bottom right, #4facfe, #00f2fe);
            color: #020202;
            text-align: center;
            margin: 0;
            padding: 30;
            font-size: 1rem;
        }

        p {
            font-size: 1.2rem;
        }

        footer {
            margin-top: 10px;
            font-size: 0.9rem;
            opacity: 0.7;
            color: #020202;
        }
    </style>
</head>

<body>
    <div
        style="padding-top: 10px; border: 1px solid black; padding: left; background: linear-gradient(to bottom right, rgb(248, 248, 234) , rgb(250, 250, 185));">
        <h2>Viento</h2>
        <div style="padding-left: 20px; border: 1px solid black;">
            <div style=" display: flex; gap: 60px; padding-left: 10px; ">
                <h2 id="vientoDir">Dati Vento</h2>
                <h2 id="viento">Dati Vento</h2>
            </div>
            <div class="container">
                <div id="quadrato1" class="quadratoDir"></div>
                <div id="quadrato2" class="quadratoVen"></div>
            </div>

            <div style="padding-left: 10px;">
                <h1 id="viento2">Dati Vento</h1>
            </div>
        </div>
        <!-- Canvas per il grafico -->
        <canvas id="graficoViento" width="400" height="200"></canvas>
    </div>

    <div
        style="padding-top: 10px; border: 1px solid black; background: linear-gradient(to bottom right, #f9fafb, #b7f1f4);">
        <h2>Mareas</h2>
        <!-- Canvas per il grafico -->
        <canvas id="graficoMaree" width="400" height="200"></canvas>
        <!-- Libreria Chart.js -->

        <div style="padding-left: 20px;   border: 1px solid black;">
            <h1 id="oldMarea">Old Marea</h1>
            <h1 id="oraMarea">Ora Marea</h1>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Script per creare il grafico -->
    <script src="funzioniVento.js"></script>
    <script type="module" src="funzioniMaree.js"></script>
    <footer>
        &copy; by Valentino
    </footer>
</body>

</html>
